name: OpenWiki Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Build OpenWiki fork
        run: |
          git clone --branch feat/ollama-provider --depth 1 https://github.com/niklasschaeffer/openwiki.git /tmp/openwiki
          cd /tmp/openwiki
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Run OpenWiki
        run: node /tmp/openwiki/dist/cli.js --update --print
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_BASE_URL: https://ollama.com
          OPENWIKI_MODEL_ID: minimax-m3
          OPENWIKI_PROVIDER: "ollama"
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: openwiki
          LANGCHAIN_TRACING_V2: ${{ secrets.LANGSMITH_API_KEY != '' && 'true' || 'false' }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.
